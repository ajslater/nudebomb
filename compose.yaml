services:
  ci:
    build:
      context: .
      target: nudebomb-ci
    image: nudebomb-ci:ci
    container_name: nudebomb-ci
    volumes:
      - ./test-results:/app/test-results
      - ./dist:/app/dist
    environment:
      - PYTHONUNBUFFERED=1
    entrypoint: [sleep, infinity]
  nudebomb-build-builder:
    build:
      context: .
      dockerfile: build.Dockerfile
    image: ajslater/nudebomb-builder
    container_name: nudebomb-build-builder
  nudebomb-test:
    image: ajslater/nudebomb-builder
    container_name: nudebomb-test
    volumes:
      - ./test-results:/app/test-results:rw
    command: make test
  nudebomb-lint:
    image: ajslater/nudebomb-builder
    container_name: nudebomb-lint
    command: make lint
  nudebomb-build:
    image: ajslater/nudebomb-builder
    container_name: nudebomb-build
    volumes:
      - ./dist:/app/dist:rw
    command: make build
